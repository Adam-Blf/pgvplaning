<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absencia — Guide de Migration Supabase → Firebase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-card:#1a1a28;--bg-hover:#22223a;
      --text-primary:#f0f0f5;--text-secondary:#a0a0b8;--text-muted:#6a6a82;
      --accent:#f59e0b;--accent-dim:#92610b;--accent-glow:rgba(245,158,11,0.15);
      --success:#22c55e;--success-dim:#166534;--success-glow:rgba(34,197,94,0.15);
      --border:#2a2a3d;--border-hover:#3a3a55;
      --danger:#ef4444;--info:#3b82f6;
      --radius:16px;--radius-sm:10px;--radius-xs:6px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh}
    
    /* === HEADER === */
    .header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 0}
    .header-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#ea580c);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 15px rgba(245,158,11,0.25)}
    .logo-text{font-weight:700;font-size:18px;letter-spacing:-0.5px}
    .logo-sub{font-size:11px;color:var(--text-muted);font-weight:400}
    .progress-badge{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;padding:6px 16px 6px 8px;font-size:13px;font-weight:600}
    .progress-ring{width:28px;height:28px;position:relative}
    .progress-ring svg{transform:rotate(-90deg);width:28px;height:28px}
    .progress-ring circle{fill:none;stroke-width:3}
    .progress-ring .bg{stroke:var(--border)}
    .progress-ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)}
    .progress-pct{font-variant-numeric:tabular-nums}

    /* === MAIN === */
    .main{max-width:900px;margin:0 auto;padding:32px 24px 120px}

    /* === HERO === */
    .hero{text-align:center;margin-bottom:48px;position:relative}
    .hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none}
    .hero h1{font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-1.5px;margin-bottom:12px;position:relative}
    .hero h1 span{background:linear-gradient(135deg,#f59e0b,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{color:var(--text-secondary);font-size:16px;max-width:550px;margin:0 auto 24px}
    .badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .badge{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;gap:6px}
    .badge.from{border-color:#3ecf8e33;color:#3ecf8e}.badge.from::before{content:'';width:8px;height:8px;border-radius:50%;background:#3ecf8e}
    .badge.arrow{border:none;background:none;color:var(--text-muted);font-size:18px}
    .badge.to{border-color:#f59e0b33;color:#f59e0b}.badge.to::before{content:'';width:8px;height:8px;border-radius:50%;background:#f59e0b}

    /* === STEPPER === */
    .phase{margin-bottom:40px}
    .phase-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;cursor:pointer;user-select:none}
    .phase-number{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;transition:all 0.3s}
    .phase-number.pending{background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted)}
    .phase-number.active{background:var(--accent);color:#000;box-shadow:0 0 20px var(--accent-glow)}
    .phase-number.done{background:var(--success);color:#fff;box-shadow:0 0 20px var(--success-glow)}
    .phase-title{font-size:20px;font-weight:700;letter-spacing:-0.5px}
    .phase-meta{font-size:12px;color:var(--text-muted);margin-left:auto;font-weight:500}

    .steps{display:flex;flex-direction:column;gap:10px;padding-left:18px;border-left:2px solid var(--border);margin-left:17px}
    .step{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all 0.25s;position:relative}
    .step:hover{border-color:var(--border-hover);background:var(--bg-hover);transform:translateX(4px)}
    .step.done{border-color:var(--success-dim);background:rgba(34,197,94,0.05)}
    .step.done .step-title{text-decoration:line-through;color:var(--text-muted)}
    
    .checkbox{width:22px;height:22px;border-radius:var(--radius-xs);border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;margin-top:1px}
    .step:hover .checkbox{border-color:var(--accent)}
    .step.done .checkbox{background:var(--success);border-color:var(--success)}
    .check-svg{opacity:0;transform:scale(0);transition:all 0.25s}
    .step.done .check-svg{opacity:1;transform:scale(1)}
    
    .step-content{flex:1;min-width:0}
    .step-title{font-weight:600;font-size:14px;margin-bottom:4px;transition:all 0.25s}
    .step-desc{font-size:12px;color:var(--text-secondary);line-height:1.5}
    .step-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:6px;text-transform:uppercase;letter-spacing:0.5px}
    .tag-auto{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(245,158,11,0.2)}
    .tag-manual{background:rgba(59,130,246,0.1);color:var(--info);border:1px solid rgba(59,130,246,0.2)}
    .tag-critical{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}

    /* === CODE BLOCKS === */
    .code-block{background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius-xs);padding:12px 14px;margin-top:10px;position:relative;font-family:'JetBrains Mono',monospace;font-size:12px;color:#a0ffa0;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
    .copy-btn{position:absolute;top:8px;right:8px;background:var(--bg-hover);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
    .copy-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
    .copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}

    /* === FOOTER === */
    .footer{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:14px 0;z-index:50}
    .footer-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .progress-bar-wrap{flex:1;height:8px;background:var(--bg-card);border-radius:100px;overflow:hidden}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#fb923c);border-radius:100px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);min-width:2px}
    .footer-text{font-size:13px;font-weight:600;color:var(--text-secondary);white-space:nowrap}
    .reset-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
    .reset-btn:hover{border-color:var(--danger);color:var(--danger)}

    /* === ANIMATIONS === */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .phase{animation:fadeInUp 0.5s ease forwards;opacity:0}
    .phase:nth-child(1){animation-delay:0.1s}.phase:nth-child(2){animation-delay:0.2s}
    .phase:nth-child(3){animation-delay:0.3s}.phase:nth-child(4){animation-delay:0.4s}
    .phase:nth-child(5){animation-delay:0.5s}

    @keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
    .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti 1.5s ease forwards;pointer-events:none;z-index:999}

    /* === RESPONSIVE === */
    @media(max-width:640px){
      .hero h1{font-size:26px}.badges{gap:6px}.phase-title{font-size:16px}
      .step{padding:12px 14px}.footer-inner{flex-wrap:wrap;gap:10px}
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div><div class="logo-text">Absencia</div><div class="logo-sub">Guide de Migration</div></div>
      </div>
      <div class="progress-badge">
        <div class="progress-ring">
          <svg viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="15.5"/><circle class="fg" id="ringFg" cx="18" cy="18" r="15.5" stroke-dasharray="97.4" stroke-dashoffset="97.4"/></svg>
        </div>
        <span class="progress-pct" id="pctText">0%</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <!-- HERO -->
    <div class="hero">
      <h1>Migration <span>Supabase → Firebase</span></h1>
      <p>Guide interactif étape par étape pour migrer Absencia vers Firebase. Coche chaque étape au fur et à mesure — ta progression est sauvegardée.</p>
      <div class="badges">
        <span class="badge from">Supabase</span>
        <span class="badge arrow">→</span>
        <span class="badge to">Firebase</span>
      </div>
    </div>

    <!-- PHASES -->
    <div id="phases"></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-text" id="footerText">0 / 0 étapes</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="barFill"></div></div>
      <button class="reset-btn" onclick="resetAll()">↺ Réinitialiser</button>
    </div>
  </footer>

  <script>
    // ========================================
    // DATA — All migration steps organized by phase
    // ========================================
    const phases = [
      {
        title: "🔐 Connexion Firebase",
        steps: [
          { id: "fb-login", title: "Se connecter à Firebase", desc: "Ouvre la console Firebase et connecte-toi avec ton compte Google.", tag: "manual", code: null },
          { id: "fb-project", title: "Créer le projet Firebase", desc: "Créer un nouveau projet Firebase nommé 'absencia' via la console.", tag: "manual", code: null },
          { id: "fb-web-app", title: "Enregistrer une Web App", desc: "Dans les paramètres du projet, ajouter une application web et copier la config.", tag: "manual", code: null },
          { id: "fb-auth", title: "Activer l'authentification Email/Password", desc: "Console Firebase → Authentication → Méthode de connexion → Activer Email/Password.", tag: "manual", code: null },
          { id: "fb-firestore", title: "Créer la base Firestore", desc: "Console Firebase → Firestore → Créer une base de données (mode production).", tag: "manual", code: null },
          { id: "fb-hosting", title: "Activer Firebase Hosting", desc: "Console Firebase → Hosting → Commencer.", tag: "manual", code: null },
        ]
      },
      {
        title: "📦 Dépendances & Config",
        steps: [
          { id: "dep-remove", title: "Retirer les packages Supabase", desc: "Désinstaller @supabase/ssr et @supabase/supabase-js.", tag: "auto", code: "npm uninstall @supabase/ssr @supabase/supabase-js" },
          { id: "dep-add", title: "Installer Firebase SDK", desc: "Ajouter firebase (client) et firebase-admin (serveur).", tag: "auto", code: "npm install firebase firebase-admin" },
          { id: "dep-env", title: "Configurer .env.local", desc: "Mettre à jour les variables d'environnement avec la config Firebase.", tag: "auto", code: "# .env.local\nNEXT_PUBLIC_FIREBASE_API_KEY=your-api-key\nNEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=your-project.firebaseapp.com\nNEXT_PUBLIC_FIREBASE_PROJECT_ID=your-project-id\nNEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=your-project.appspot.com\nNEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=your-sender-id\nNEXT_PUBLIC_FIREBASE_APP_ID=your-app-id\nFIREBASE_ADMIN_CLIENT_EMAIL=firebase-adminsdk@your-project.iam.gserviceaccount.com\nFIREBASE_ADMIN_PRIVATE_KEY=\"-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\"" },
          { id: "dep-firebase-json", title: "Créer firebase.json", desc: "Fichier de configuration Firebase (hosting + firestore).", tag: "auto", code: null },
          { id: "dep-rules", title: "Créer firestore.rules", desc: "Règles de sécurité Firestore (équivalent des RLS Supabase).", tag: "auto", code: null },
        ]
      },
      {
        title: "🔥 Couche Firebase (lib/firebase/)",
        steps: [
          { id: "lib-config", title: "Créer lib/firebase/config.ts", desc: "Configuration client Firebase : initializeApp, getAuth, getFirestore.", tag: "auto", code: null },
          { id: "lib-admin", title: "Créer lib/firebase/admin.ts", desc: "Firebase Admin SDK pour les API routes serveur (vérification tokens).", tag: "auto", code: null },
          { id: "lib-auth", title: "Créer lib/firebase/auth.ts", desc: "Fonctions d'auth : signIn, signUp, signOut, onAuthStateChanged.", tag: "auto", code: null },
          { id: "lib-firestore", title: "Créer lib/firebase/firestore.ts", desc: "Fonctions CRUD Firestore : teams, members, calendar, invitations.", tag: "auto", code: null },
          { id: "lib-delete-supa", title: "Supprimer lib/supabase/", desc: "Supprimer l'ancien dossier Supabase (client.ts, server.ts, middleware.ts, profile-utils.ts).", tag: "auto", code: "rm -rf lib/supabase/" },
        ]
      },
      {
        title: "🔄 Migration du Code",
        steps: [
          { id: "mig-middleware", title: "Adapter middleware.ts", desc: "Remplacer la session Supabase par vérification du token Firebase via cookie.", tag: "auto", code: null },
          { id: "mig-use-auth", title: "Adapter hooks/use-auth.ts", desc: "Utiliser onAuthStateChanged de Firebase au lieu de Supabase.", tag: "auto", code: null },
          { id: "mig-team-ctx", title: "Adapter contexts/team-context.tsx", desc: "Remplacer les requêtes Supabase par des requêtes Firestore.", tag: "auto", code: null },
          { id: "mig-calendar", title: "Adapter hooks/use-calendar-data.ts", desc: "Ajouter sync Firestore (garder fallback localStorage pour mode invité).", tag: "auto", code: null },
          { id: "mig-stats", title: "Adapter hooks/use-calendar-stats.ts", desc: "Adapter les stats pour requêtes Firestore.", tag: "auto", code: null },
          { id: "mig-leave", title: "Adapter hooks/use-leave-info.ts", desc: "Remplacer l'appel RPC get_leave_info par requête Firestore.", tag: "auto", code: null },
          { id: "mig-login", title: "Adapter app/login/page.tsx", desc: "signInWithEmailAndPassword + createUserWithEmailAndPassword.", tag: "critical", code: null },
          { id: "mig-callback", title: "Adapter app/auth/callback/route.ts", desc: "Gérer le cookie de session Firebase au lieu du callback Supabase.", tag: "auto", code: null },
          { id: "mig-types", title: "Adapter types/database.ts", desc: "Retirer le schéma Supabase Database, garder les interfaces métier.", tag: "auto", code: null },
        ]
      },
      {
        title: "🛣️ Migration des API Routes",
        steps: [
          { id: "api-teams", title: "api/teams/route.ts (POST/GET)", desc: "Créer/récupérer des teams via Firebase Admin + Firestore.", tag: "critical", code: null },
          { id: "api-teams-join", title: "api/teams/join/route.ts", desc: "Rejoindre une team → Firestore transaction.", tag: "auto", code: null },
          { id: "api-teams-id", title: "api/teams/[id]/route.ts", desc: "CRUD team spécifique → Firestore.", tag: "auto", code: null },
          { id: "api-teams-leave", title: "api/teams/[id]/leave/route.ts", desc: "Quitter une team → Firestore.", tag: "auto", code: null },
          { id: "api-invitations", title: "api/teams/invitations/ (2 routes)", desc: "Gestion des invitations → Firestore.", tag: "auto", code: null },
          { id: "api-birthdays", title: "api/teams/birthdays/route.ts", desc: "Requête anniversaires → Firestore.", tag: "auto", code: null },
          { id: "api-leave-info", title: "api/teams/leave-info/route.ts", desc: "Infos congés → Firestore.", tag: "auto", code: null },
          { id: "api-admin", title: "api/admin/ (2 routes)", desc: "Admin équipe + membres → Firebase Admin.", tag: "auto", code: null },
        ]
      },
      {
        title: "📄 Pages & UI",
        steps: [
          { id: "page-setup", title: "app/setup/page.tsx", desc: "Adapter les imports Supabase → Firebase.", tag: "auto", code: null },
          { id: "page-create", title: "app/team/create/page.tsx", desc: "Formulaire création d'équipe → Firebase.", tag: "auto", code: null },
          { id: "page-join", title: "app/team/join/page.tsx", desc: "Rejoindre une équipe → Firebase.", tag: "auto", code: null },
          { id: "page-team-setup", title: "app/team/setup/page.tsx", desc: "Configuration équipe → Firebase.", tag: "auto", code: null },
          { id: "page-invite", title: "app/invite/[token]/page.tsx", desc: "Invitation par lien → Firebase.", tag: "auto", code: null },
        ]
      },
      {
        title: "🧹 Nettoyage & Déploiement",
        steps: [
          { id: "clean-supabase", title: "Supprimer le dossier supabase/", desc: "Migrations SQL et config.toml ne sont plus nécessaires.", tag: "auto", code: "rm -rf supabase/" },
          { id: "clean-vercel", title: "Supprimer vercel.json", desc: "Remplacé par firebase.json.", tag: "auto", code: "rm vercel.json" },
          { id: "build", title: "Build du projet", desc: "Vérifier que le build passe sans erreurs.", tag: "critical", code: "npm run build" },
          { id: "test-local", title: "Test local", desc: "Lancer le serveur de développement et tester manuellement.", tag: "manual", code: "npm run dev" },
          { id: "deploy", title: "Déployer sur Firebase", desc: "Déployer l'app sur Firebase Hosting.", tag: "critical", code: "npx firebase-tools deploy --only hosting" },
          { id: "readme", title: "Mettre à jour README.md", desc: "Mettre à jour la doc avec les nouvelles instructions Firebase.", tag: "auto", code: null },
          { id: "git-push", title: "Commit + Push GitHub", desc: "Commit final et push des changements.", tag: "manual", code: "git add -A && git commit -m \"feat: migrate from Supabase to Firebase\" && git push origin main" },
        ]
      },
    ];

    // ========================================
    // STATE & PERSISTENCE
    // ========================================
    const STORAGE_KEY = 'absencia-migration-progress';
    let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const allStepIds = phases.flatMap(p => p.steps.map(s => s.id));
    const totalSteps = allStepIds.length;

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); }

    function toggle(id) {
      checked[id] = !checked[id];
      save();
      render();
      const count = allStepIds.filter(id => checked[id]).length;
      if (count === totalSteps) celebrate();
    }

    function resetAll() {
      if (!confirm('Réinitialiser toute la progression ?')) return;
      checked = {};
      save();
      render();
    }

    // ========================================
    // COPY TO CLIPBOARD
    // ========================================
    function copyCode(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copié !';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // ========================================
    // RENDER
    // ========================================
    function render() {
      const count = allStepIds.filter(id => checked[id]).length;
      const pct = Math.round((count / totalSteps) * 100);

      // Progress ring
      const circumference = 97.4;
      document.getElementById('ringFg').style.strokeDashoffset = circumference - (circumference * pct / 100);
      document.getElementById('pctText').textContent = pct + '%';

      // Footer bar
      document.getElementById('barFill').style.width = pct + '%';
      document.getElementById('footerText').textContent = `${count} / ${totalSteps} étapes`;

      // Phases
      const container = document.getElementById('phases');
      container.innerHTML = '';

      phases.forEach((phase, pi) => {
        const phaseDone = phase.steps.every(s => checked[s.id]);
        const phaseActive = phase.steps.some(s => checked[s.id]) && !phaseDone;
        const statusClass = phaseDone ? 'done' : phaseActive ? 'active' : 'pending';
        const phaseChecked = phase.steps.filter(s => checked[s.id]).length;

        let html = `<div class="phase">
          <div class="phase-header">
            <div class="phase-number ${statusClass}">${phaseDone ? '✓' : pi + 1}</div>
            <div class="phase-title">${phase.title}</div>
            <div class="phase-meta">${phaseChecked}/${phase.steps.length}</div>
          </div>
          <div class="steps">`;

        phase.steps.forEach(step => {
          const isDone = checked[step.id];
          const tagClass = step.tag === 'auto' ? 'tag-auto' : step.tag === 'critical' ? 'tag-critical' : 'tag-manual';
          const tagLabel = step.tag === 'auto' ? 'Automatisé' : step.tag === 'critical' ? 'Critique' : 'Manuel';

          html += `<div class="step ${isDone ? 'done' : ''}" onclick="toggle('${step.id}')">
            <div class="checkbox">
              <svg class="check-svg" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="step-content">
              <div class="step-title">${step.title}</div>
              <div class="step-desc">${step.desc}</div>
              <span class="step-tag ${tagClass}">${tagLabel}</span>
              ${step.code ? `<div class="code-block" onclick="event.stopPropagation()"><button class="copy-btn" onclick="event.stopPropagation();copyCode(this,\`${step.code.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`)">Copier</button>${escapeHtml(step.code)}</div>` : ''}
            </div>
          </div>`;
        });

        html += '</div></div>';
        container.innerHTML += html;
      });
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ========================================
    // CELEBRATION 🎉
    // ========================================
    function celebrate() {
      const colors = ['#f59e0b', '#22c55e', '#3b82f6', '#ef4444', '#a855f7', '#ec4899'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = Math.random() * 50 + 50 + 'vh';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.animationDuration = (1 + Math.random()) + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2500);
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
